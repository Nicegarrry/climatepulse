services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: climatepulse
      POSTGRES_PASSWORD: climatepulse
      POSTGRES_DB: climatepulse
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
